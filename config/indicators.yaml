# 指示灯定义
indicators:
  - id: "bat_warn_light"
    type: "light"
    image_on: "warning_bat_red.png"
    image_off: "warning_bat_dim.png"
    size: { width: 60, height: 60 }
    position: { x: 600, y: 260 }
    flash_on_fault: true

  - id: "soc_warn_light"
    type: "light"
    image_on: "warning_soc_orange.png"
    image_off: "warning_soc_dim.png"
    size: { width: 60, height: 60 }
    position: { x: 660, y: 260 }

  - id: "motor_warn_light"
    type: "light"
    image_on: "warning_motor_red.png"
    image_off: "warning_motor_dim.png"
    size: { width: 60, height: 60 }
    position: { x: 720, y: 260 }

  - id: "ready_go_light"
    type: "light"
    image_on: "ready_go_green.png"
    image_off: "ready_go_dim.png"
    size: { width: 60, height: 60 }
    position: { x: 780, y: 260 }

  - id: "high_voltage_light"
    type: "light"
    image_on: "hv_orange.png"
    image_off: "hv_dim.png"
    size: { width: 50, height: 50 }
    position: { x: 20, y: 20 }

  - id: "engine_run_light"
    type: "light"
    image_on: "engine_run_white.png"
    image_off: "engine_run_dim.png"
    size: { width: 60, height: 60 }
    position: { x: 540, y: 260 }
    color: "#FFFFFF"

  - id: "ev_mode_light"
    type: "light"
    image_on: "ev_mode_green.png"
    image_off: "ev_mode_dim.png"
    size: { width: 60, height: 60 }
    position: { x: 200, y: 180 }
    color: "#00FF00"

  - id: "hybrid_mode_light"
    type: "light"
    image_on: "hybrid_mode_blue.png"
    image_off: "hybrid_mode_dim.png"
    size: { width: 60, height: 60 }
    position: { x: 260, y: 180 }
    color: "#0066FF"

  - id: "energy_flow_light"
    type: "light"
    image_on: "energy_flow_active.png"
    image_off: "energy_flow_inactive.png"
    size: { width: 60, height: 60 }
    position: { x: 320, y: 180 }
    color: "#FFCC00"

  - id: "charge_light"
    type: "light"
    image_on: "charge_blue.png"
    image_off: "charge_blue_dim.png"
    size: { width: 50, height: 50 }
    position: { x: 400, y: 260 }

  - id: "charge_fault_light"
    type: "light"
    image_on: "charge_fault_red.png"
    image_off: "charge_fault_red_dim.png"
    size: { width: 50, height: 50 }
    position: { x: 450, y: 260 }
    flash_on_fault: true

  - id: "fuel_low_light"
    type: "light"
    image_on: "fuel_low_yellow.png"
    image_off: "fuel_low_dim.png"
    size: { width: 50, height: 50 }
    position: { x: 600, y: 300 }
    flash_on_fault: false

  - id: "ev_range_warn_light"
    type: "light"
    image_on: "ev_range_warn_yellow.png"
    image_off: "ev_range_warn_dim.png"
    size: { width: 50, height: 50 }
    position: { x: 660, y: 300 }
    flash_on_fault: false

  - id: "high_voltage_warn_light"
    type: "light"
    image_on: "hv_warn_red.png"
    image_off: "hv_warn_dim.png"
    size: { width: 50, height: 50 }
    position: { x: 80, y: 20 }
    flash_on_fault: true

  - id: "sys_fault_light"
    type: "light"
    image_on: "sys_fault_red.png"
    image_off: "sys_fault_dim.png"
    size: { width: 60, height: 60 }
    position: { x: 20, y: 80 }
    flash_on_fault: true

  - id: "bat_critical_light"
    type: "light"
    image_on: "bat_critical_red.png"
    image_off: "bat_critical_dim.png"
    size: { width: 60, height: 60 }
    position: { x: 600, y: 260 }
    flash_on_fault: true

  - id: "tire_pressure_light"
    type: "light"
    image_on: "tire_pressure_red.png"
    image_off: "tire_pressure_dim.png"
    size: { width: 60, height: 60 }
    position: { x: 120, y: 20 }
    flash_on_fault: true
