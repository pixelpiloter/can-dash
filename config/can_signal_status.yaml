# CAN 信号健康监控配置
signals:
  - name: "vehicle_speed"
    can_id: 0x203
    timeout_ms: 500
    validity:
      min: 0
      max: 300
      max_delta: 50

  - name: "bat_volt"
    can_id: 0x186040F3
    timeout_ms: 1000
    validity:
      min: 200
      max: 450

  - name: "bat_soc"
    can_id: 0x186040F3
    timeout_ms: 1000
    validity:
      min: 0
      max: 100
    smoothing: true
    smoothing_window: 5

  - name: "motor_rpm"
    can_id: 0x101
    timeout_ms: 1000
    validity:
      min: -5000
      max: 15000
      max_delta: 2000

  - name: "motor_temp"
    can_id: 0x101
    timeout_ms: 2000
    validity:
      min: -40
      max: 200

  - name: "charge_status"
    can_id: 0x306
    timeout_ms: 1000
    validity:
      min: 0
      max: 2

  - name: "engine_rpm"
    can_id: 0x305
    timeout_ms: 500
    validity:
      min: 0
      max: 8000
      max_delta: 1000

  - name: "engine_fault"
    can_id: 0x305
    timeout_ms: 500
    validity:
      min: 0
      max: 1

  - name: "ev_range"
    can_id: 0x307
    timeout_ms: 500
    validity:
      min: 0
      max: 300

  - name: "fuel_level"
    can_id: 0x308
    timeout_ms: 500
    validity:
      min: 0
      max: 100

  - name: "fuel_range"
    can_id: 0x308
    timeout_ms: 500
    validity:
      min: 0
      max: 1000

  - name: "gear_status"
    can_id: 0x309
    timeout_ms: 500
    validity:
      min: 0
      max: 4

  - name: "battery_temp"
    can_id: 0x186040F3
    timeout_ms: 500
    validity:
      min: -40
      max: 85
