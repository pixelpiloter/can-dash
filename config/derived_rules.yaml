# derived_rules.yaml
# 运行时配置驱动的派生计算 / 状态机 / 报警引擎 (PR-EXPR-2: 集成到 ShmDataSource)
# 引擎: exprtk + yaml-cpp
# 接入点: ShmDataSource::onTick() 在 "5. 推送快照" 前 evaluate(ctx)
# 数据流: DisplaySnapshot 拍平 → ctx → exprtk 求值 → setter 改 m_snapshot → binder 自动 NOTIFY
#
# 表达式可用变量 (C++ 端 registerVariable 绑定到 ctx 字段):
#   bat_soc, bat_volt, vehicle_speed, motor_temp
#   precharge_status, idle_seconds
#   bat_soc_lost, bat_volt_lost, vehicle_speed_lost
#   driver_occupied, driver_buckled
#   passenger_occupied, passenger_buckled
#   health (0=disconnected 1=waiting 2=stale 3=ok)
#   view_current
#
# 表达式可用 setter (C++ 端 registerSetter 注册):
#   set_trip_range_confidence(v: 0-100)     ← PR-EXPR-2 验证
#   set_view_mode(v: 0=DRIVE 1=READY 2=SHUTDOWN 3=GO)        ← PR-EXPR-3 加
#   set_indicator(id: 0-11, on, flash, hz)   ← PR-EXPR-3 加
#   push_alarm(name, zh, en, severity, color) ← PR-EXPR-3 加

derived_metrics:
  # ── 续航可信度: 5 档分支 (示例规则, 跟现有 L2 trip_computer 算法等价) ──
  - id: "range_confidence"
    expr: |
      if (bat_soc_lost == 1) {
        set_trip_range_confidence(0);
      } else if (bat_soc < 5) {
        set_trip_range_confidence(0);
      } else if (bat_soc < 10) {
        set_trip_range_confidence(20);
      } else if (vehicle_speed == 0 and idle_seconds > 30) {
        set_trip_range_confidence(30);
      } else {
        set_trip_range_confidence(100);
      }
