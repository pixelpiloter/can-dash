name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6 and deps
        run: |
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y universe
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev qt6-declarative-dev qt6-svg-dev

      - name: Install Python deps
        run: |
          pip install pyyaml jsonschema pydantic

      - name: Validate YAML
        run: |
          python tools/validate.py

      - name: Generate C code
        run: |
          python tools/yaml_to_c.py

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          cmake ..

      - name: Build
        run: |
          cd build
          make -j$(nproc)

      - name: Run tests
        run: |
          cd build
          ctest --output-on-failure
