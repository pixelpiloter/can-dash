name: CI

# 策略：lint + ut + validate-yaml 是核心（必须绿），不依赖 Qt 安装。
# 老 build job 用 jurplel/qt6-git 装 Qt 在 hosted runner 上反复失败，
# 且仓库的 find_package(Qt6) 是 optional —— 没 Qt 也能跑所有 Layer 1/2 测试。
# 完整 Qt GUI 烟雾测试留给本地 ./build.sh，不阻塞 PR。
#
# 历史上 4 次 "fix CI" commit 全是 Qt 装包问题。这次彻底绕开。

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# 取消同一 ref 上前次未完成的 in-progress run，避免新 push 排队
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (header guards, cppcheck)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 10
      - name: Install cppcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq cppcheck
      - name: Header guard check
        run: bash tools/lint_header_guards.sh
      - name: Cppcheck (layer1 + layer2 + tests)
        run: bash tools/run_cppcheck.sh

  validate-yaml:
    name: Validate YAML config
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: pip3 install --quiet pyyaml jsonschema pydantic cantools python-can
      - name: Validate config
        run: python3 tools/validate.py

  validate-dbc:
    name: Validate DBC ↔ YAML
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: pip3 install --quiet pyyaml cantools
      - name: Run DBC unit tests
        run: python3 tests/test_dbc_to_yaml.py

  ut:
    name: Unit tests (no Qt)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential cmake ninja-build \
            python3-pip python3-yaml python3-jsonschema python3-pydantic
          pip3 install --quiet pyyaml jsonschema pydantic cantools python-can
      - name: Generate code from YAML
        run: |
          python3 tools/yaml_to_c.py
          python3 tools/fix_generated.py src/generated
          python3 tools/qml_generator.py || true
          touch src/generated/.generated_stamp
      - name: Configure (Qt-less; find_package will report NOTFOUND and skip UI)
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build (only the *_test targets; can-dash binary requires Qt and is skipped)
        run: |
          cmake --build build --target \
            test_can_converter test_alarm_runtime test_seat_belt_runtime \
            test_event_bus test_vehicle_logic test_indicator_runtime \
            test_can_signal_monitor test_shm_display test_time_util \
            test_transport test_self_test_runtime test_perf_baseline \
            test_theme_manager test_warning_manager test_settings_manager \
            test_view_manager \
            --parallel -j$(nproc)
          # PR5 Layer 3 测试在 Qt6 可用时注册（CI 默认没装 Qt，跳过）
      - name: Run tests
        run: |
          cd build
          # 串行跑：test_shm_display / test_transport 共享 /dev/shm/can_display，
          # 并行会冲突死锁（PR1 历史经验）
          ctest --output-on-failure -j1
