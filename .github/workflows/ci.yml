name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache Qt6
        id: cache-qt
        uses: actions/cache@v4
        with:
          path: ~/qt6
          key: qt6-672-gcc_64

      - name: Install Qt6
        if: steps.cache-qt.outputs.cache-hit != 'true'
        run: |
          pip install aqtinstall
          aqt install-qt linux desktop 6.7.2 gcc_64 -O ~/qt6

      - name: Install Python deps
        run: |
          pip install pyyaml jsonschema pydantic

      - name: Validate YAML
        run: |
          python tools/validate.py

      - name: Generate C code
        run: |
          python tools/yaml_to_c.py

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_PREFIX_PATH=$HOME/qt6/6.7.2/gcc_64/lib/cmake

      - name: Build
        run: |
          cd build
          make -j$(nproc)

      - name: Run tests
        run: |
          cd build
          ctest --output-on-failure
